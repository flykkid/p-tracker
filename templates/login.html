<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Go Shop - Acceso</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:Inter,sans-serif; background:linear-gradient(180deg, #f0f4f8, #e8edf3); min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#fff; border-radius:20px; padding:45px 35px; width:100%; max-width:420px; box-shadow:0 4px 24px rgba(0,0,0,0.06); }
        .logo { text-align:center; margin-bottom:30px; }
        .logo h2 { font-size:24px; font-weight:800; color:#1a56db; }
        .logo p { font-size:13px; color:#94a3b8; }
        h1 { font-size:20px; font-weight:700; color:#0f172a; text-align:center; margin-bottom:8px; }
        .sub { text-align:center; color:#64748b; font-size:14px; margin-bottom:25px; }
        .error { background:#fef2f2; border:1px solid #fecaca; color:#dc2626; padding:12px; border-radius:10px; font-size:13px; margin-bottom:16px; text-align:center; }
        label { display:block; font-size:13px; font-weight:600; color:#1e293b; margin-bottom:6px; }
        input { width:100%; padding:14px 16px; border:2px solid #e2e8f0; border-radius:12px; font-size:15px; font-family:Inter,sans-serif; margin-bottom:16px; outline:none; }
        input:focus { border-color:#1a56db; }
        button { width:100%; padding:14px; background:#1a56db; color:#fff; border:none; border-radius:12px; font-size:15px; font-weight:600; cursor:pointer; }
        button:hover { background:#1e40af; }
        .back { display:block; text-align:center; margin-top:16px; color:#94a3b8; text-decoration:none; font-size:13px; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo"><h2>Go Shop</h2><p>Logistics</p></div>
    <h1>Acceso</h1><p class="sub">Panel de administracion</p>
    <!--ERROR-->
    <form method="post">
        <label>Usuario</label><input name="username" placeholder="admin" required>
        <label>Contrasena</label><input type="password" name="password" required>
        <button>Iniciar Sesion</button>
    </form>
    <a href="/" class="back">Volver</a>
</div>
</body>
</html>
