<html>

<head>
    <title>Login Admin</title>

    <style>

        body{
            font-family:Arial;
            background:#f2f2f2;
            padding:50px;
        }

        .box{
            background:white;
            width:350px;
            margin:auto;
            padding:30px;
            border-radius:15px;
            text-align:center;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        input{
            width:90%;
            padding:10px;
            margin-top:15px;
            border-radius:8px;
            border:1px solid #ccc;
        }

        button{
            margin-top:20px;
            padding:10px 20px;
            background:#007bff;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>🔐 Login Admin</h1>

        <form action="/login" method="post">

            <input
                type="text"
                name="username"
                placeholder="Usuario"
            >

            <input
                type="password"
                name="password"
                placeholder="Contraseña"
            >

            <br>

            <button type="submit">
                Ingresar
            </button>

        </form>

    </div>

</body>

</html>
