<!DOCTYPE html>
<html lang='es'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Pedido no encontrado - Go Shop</title>
    <link href='https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap' rel='stylesheet'>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Inter',sans-serif; background:#f0f4f8; min-height:100vh; display:flex; align-items:center; justify-content:center; }
        .card { background:#fff; border-radius:16px; padding:40px; text-align:center; max-width:450px; box-shadow:0 2px 12px rgba(0,0,0,0.04); }
        .icon { font-size:60px; margin-bottom:20px; }
        h1 { font-size:20px; color:#1e293b; margin-bottom:8px; }
        p { color:#64748b; margin-bottom:20px; font-size:14px; }
        .codigo { background:#f1f5f9; padding:8px 16px; border-radius:8px; font-weight:600; color:#1e293b; }
        a { display:inline-block; margin-top:20px; padding:12px 24px; background:#1a56db; color:#fff; text-decoration:none; border-radius:10px; font-weight:500; transition:0.3s; }
        a:hover { background:#1e40af; }
    </style>
</head>
<body>
    <div class='card'>
        <div class='icon'>??</div>
        <h1>Pedido no encontrado</h1>
        <p>No se encontro ningun pedido con el codigo <span class='codigo'>{CODIGO}</span></p>
        <p style='font-size:13px;'>Verifique el numero e intente nuevamente</p>
        <a href='/'>Volver al inicio</a>
    </div>
</body>
</html>
